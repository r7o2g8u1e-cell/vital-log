.modal-box{background:linear-gradient(135deg,var(--card),var(--bg2));border:1px solid var(--border2);border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}

#app{max-width:480px;margin:0 auto;padding:12px 16px 100px;}
.tab-bar{display:flex;gap:4px;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--border);}

.tab-btn.active{background:linear-gradient(135deg,rgba(110,231,183,0.13),rgba(129,140,248,0.13));color:var(--t1);}
.tab-btn:not(.active){background:transparent;color:var(--t3);}
</style>

<div id="header" style="padding:16px 20px 8px;background:linear-gradient(180deg,var(--bg),transparent);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);max-width:480px;margin:0 auto;">

<script>
// ═══════════════════════════════════════════
// IndexedDB Storage Layer
// ═══════════════════════════════════════════
const DB_NAME='VitalLogDB';const DB_VER=1;
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}
function dbGet(key){
  return new Promise((res,rej)=>{
    const tx=db.transaction('kv','readonly');const s=tx.objectStore('kv');
    const req=s.get(key);req.onsuccess=()=>res(req.result!==undefined?req.result:null);req.onerror=()=>res(null);
  });
}
function dbSet(key,val){
  return new Promise((res,rej)=>{
    const tx=db.transaction('kv','readwrite');const s=tx.objectStore('kv');
    s.put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej();
  });
}
function dbDelete(key){
  return new Promise((res,rej)=>{
    const tx=db.transaction('kv','readwrite');const s=tx.objectStore('kv');
    s.delete(key);tx.oncomplete=()=>res();tx.onerror=()=>rej();
  });
}
function dbKeys(prefix=''){
  return new Promise((res,rej)=>{
    const tx=db.transaction('kv','readonly');const s=tx.objectStore('kv');
    const req=s.getAllKeys();req.onsuccess=()=>{
      const keys=req.result.filter(k=>typeof k==='string'&&k.startsWith(prefix));res(keys);
    };req.onerror=()=>res([]);
  });
}

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
const SKEY='app-settings',MHKEY='med-history',MCK='med-changes',WKPX='weekly-summary:';
const DEFAULT_TAGS=["ストレス","リラックス","不安","充実"];

const defEx=[
  {id:"wp1",name:"Day A — 腕・前腕",items:[{name:"前腕_上",weight:"5kg",reps:"10回×3",note:""},{name:"前腕_下",weight:"6kg",reps:"10回×3",note:"次回重量up"},{name:"上腕二頭筋",weight:"7kg",reps:"10回×3",note:""},{name:"上腕三頭筋",weight:"6kg",reps:"10回×3",note:""}]},
  {id:"wp2",name:"Day B — ベンチ・レッグ",items:[{name:"ベンチプレス",weight:"35kg",reps:"",note:""},{name:"レッグプレス&ふくらはぎ",weight:"114kg",reps:"",note:""}]},
  {id:"wp3",name:"Day C — 有酸素・チェスト",items:[{name:"ランニング",weight:"",reps:"20min",note:"ルーティン"},{name:"バーチカルチェストプレス",weight:"34kg",reps:"",note:""},{name:"リアルデルトペックフライ",weight:"20kg",reps:"",note:""},{name:"リカバリーウォーキング",weight:"",reps:"10分",note:"速さ4.6"}]},
  {id:"wp4",name:"Day D — 積極的休養（水泳）",items:[{name:"アップ（平泳ぎ/背泳ぎ）",weight:"",reps:"200m",note:"ゆるく"},{name:"メイン 50m×10本",weight:"",reps:"500m",note:"呼吸が上がらないペース / 休憩15〜30秒"},{name:"ダウン",weight:"",reps:"100〜200m",note:""}]},
];

const defSettings={presetMeds:[{id:"m1",name:"薬A",dose:"10mg",timing:"朝"},{id:"m2",name:"薬B",dose:"5mg",timing:"夜"}],customTags:[],exercisePresets:defEx,apiKey:""};

function emptyLog(){return{medications:[],selectedWorkouts:[],restDay:false,exercises:[],sleep:{bedtime:"23:00",wakeup:"07:00",quality:3,note:"",deep:null,rem:null,core:null,awake:null,hr:null,resp:null},journal:{text:"",moodScore:5,tags:[],autoTags:null,summary:null},evaluation:{productivity:5,mental:5},skipped:{}};}

let state={
  view:'record',selDate:fd(new Date()),log:emptyLog(),settings:defSettings,
  medHist:[],logDates:{},saving:false,dashRange:7,dashData:[],
  calMonth:new Date(),aiInsight:null,aiLoading:false,exOverride:null,sTab:'meds'
};

function fd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// ═══════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════
function showToast(msg){
  const el=document.getElementById('toast-container');
  el.innerHTML=`<div class="toast">${msg}</div>`;
  setTimeout(()=>{el.innerHTML='';},2500);
}

// ═══════════════════════════════════════════
// Render Engine (simplified virtual DOM)
// ═══════════════════════════════════════════
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else if(k==='value'&&(tag==='input'||tag==='textarea'||tag==='select')){el.value=v;}
    else if(k==='checked'){el.checked=v;}
    else if(k==='selected'){el.selected=v;}
    else if(k==='innerHTML'){el.innerHTML=v;}
    else{el.setAttribute(k,v);}
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return el;
}

// ═══════════════════════════════════════════
// This app is very large. Due to file size constraints,
// we'll implement a simplified but fully functional version
// that preserves all core features from the React artifact.
// ═══════════════════════════════════════════

async function init(){
  await openDB();
  // Load settings
  const saved=await dbGet(SKEY);
  if(saved)state.settings={...defSettings,...saved};
  const mh=await dbGet(MHKEY);
  if(mh)state.medHist=mh;
  // Load logged dates
  await refreshLogDates();
  // Load today's log
  await loadLog(state.selDate);
  // Render
  renderTabs();
  render();
  // Register SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

async function refreshLogDates(){
  const keys=await dbKeys('log:');
  const map={};
  for(const k of keys){
    const date=k.replace('log:','');
    const d=await dbGet(k);
    if(d)map[date]={p:d.evaluation?.productivity||0,m:d.evaluation?.mental||0};
  }
  state.logDates=map;
}

async function loadLog(date){
  const d=await dbGet('log:'+date);
  if(d){
    state.log={...emptyLog(),...d,selectedWorkouts:d.selectedWorkouts||[],skipped:d.skipped||{},restDay:!!d.restDay,journal:{...emptyLog().journal,...(d.journal||{})}};
  }else{
    const meds=state.settings.presetMeds.map(p=>({presetId:p.id,name:p.name,dose:p.dose,timing:p.timing,taken:false,note:""}));
    state.log={...emptyLog(),medications:meds};
  }
  state.aiInsight=null;state.exOverride=null;
}

function renderTabs(){
  const tabs=[
    {id:'record',label:'記録'},{id:'dash',label:'分析'},
    {id:'history',label:'履歴'},{id:'settings',label:'設定'}
  ];
  const el=document.getElementById('tabs');
  el.innerHTML='';
  tabs.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(state.view===t.id?' active':'');
    btn.textContent=t.label;
    btn.onclick=()=>{state.view=t.id;renderTabs();render();};
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// Main Render
// ═══════════════════════════════════════════
async function render(){
  const app=document.getElementById('app');
  const badge=document.getElementById('date-badge');
  badge.style.display=state.view==='record'?'block':'none';
  badge.textContent=state.selDate;

  app.innerHTML='';

  switch(state.view){
    case 'record': renderRecord(app); break;
    case 'dash': await renderDashboard(app); break;
    case 'history': renderCalendar(app); break;
    case 'settings': renderSettings(app); break;
  }
}

// ═══════════════════════════════════════════
// RECORD VIEW
// ═══════════════════════════════════════════
function renderRecord(app){
  const log=state.log;

  // Streak
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(state.logDates[fd(d)])streak++;else break;}
  if(streak>0){
    const badge=streak>=30?'MASTER':streak>=14?'GREAT':streak>=7?'NICE':'';
    app.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'10px 16px',background:'linear-gradient(135deg,rgba(251,146,60,0.07),rgba(249,115,22,0.07))',border:'1px solid rgba(251,146,60,0.13)',borderRadius:'12px',marginBottom:'16px'}},
      h('span',{style:{fontSize:'13px',fontWeight:700,color:'var(--orange)',fontFamily:'var(--mono)'}},String(streak)),
      h('span',{style:{fontSize:'12px',color:'var(--t2)'}},'日連続記録中'),
      badge?h('span',{style:{marginLeft:'auto',fontSize:'10px',color:'var(--orange)',background:'rgba(251,146,60,0.1)',padding:'2px 8px',borderRadius:'8px',fontWeight:600}},badge):''
    ));
  }

  // Missed days
  const missed=[];
  for(let i=1;i<=14;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=fd(d);if(!state.logDates[ds])missed.push(ds);}
  if(missed.length>0){
    const banner=h('div',{style:{padding:'10px 14px',background:'rgba(251,191,36,0.05)',border:'1px solid rgba(251,191,36,0.13)',borderRadius:'12px',marginBottom:'16px'}},
      h('span',{style:{fontSize:'12px',color:'var(--yellow)',fontWeight:600}},`直近14日間で${missed.length}日未記録`),
      h('div',{style:{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}},
        ...missed.slice(0,5).map(d=>h('button',{className:'btn-nav',style:{fontSize:'10px',padding:'2px 8px'},onClick:()=>{state.selDate=d;loadLog(d).then(render);}},d.slice(5))),
        missed.length>5?h('span',{style:{fontSize:'10px',color:'var(--t3)'}},`+${missed.length-5}日`):''
      )
    );
    app.appendChild(banner);
  }

  // Date nav
  const dateNav=h('div',{style:{display:'flex',justifyContent:'center',gap:'12px',marginBottom:'16px'}},
    h('button',{className:'btn-nav',onClick:()=>{const d=new Date(state.selDate);d.setDate(d.getDate()-1);state.selDate=fd(d);loadLog(state.selDate).then(render);}},'◀ 前日'),
    h('button',{className:'btn-nav',style:{background:state.selDate===fd(new Date())?'rgba(110,231,183,0.2)':'var(--border)',color:state.selDate===fd(new Date())?'var(--green)':'var(--t2)'},onClick:()=>{state.selDate=fd(new Date());loadLog(state.selDate).then(render);}},'今日'),
    h('button',{className:'btn-nav',onClick:()=>{const d=new Date(state.selDate);d.setDate(d.getDate()+1);state.selDate=fd(d);loadLog(state.selDate).then(render);}},'翌日 ▶')
  );
  app.appendChild(dateNav);

  // Medications Section
  const medSec=createSection('服薬','var(--pink)');
  log.medications.forEach((med,i)=>{
    const row=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px',padding:'10px 12px',borderRadius:'10px',background:med.taken?'rgba(244,114,182,0.05)':'var(--border)',border:med.taken?'1px solid rgba(244,114,182,0.13)':'1px solid var(--border2)'}},
      h('button',{style:{width:'26px',height:'26px',borderRadius:'7px',border:'none',background:med.taken?'linear-gradient(135deg,var(--pink),#e879a8)':'var(--border2)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#fff',fontSize:'12px'},onClick:()=>{log.medications[i].taken=!log.medications[i].taken;render();}},med.taken?'✓':''),
      h('div',{style:{flex:1}},
        med.presetId
          ?h('span',{style:{fontSize:'14px',fontWeight:600,color:med.taken?'#f9a8d4':'var(--t2)'}},med.name+' ',h('span',{style:{fontSize:'11px',color:'var(--t3)'}},med.dose+'/'+med.timing))
          :h('div',{style:{display:'flex',gap:'6px'}},
            h('input',{className:'inp',value:med.name,placeholder:'薬名',style:{flex:1},onInput:e=>{log.medications[i].name=e.target.value;}}),
            h('input',{className:'inp',value:med.dose,placeholder:'用量',style:{width:'70px'},onInput:e=>{log.medications[i].dose=e.target.value;}})
          )
      ),
      !med.presetId?h('button',{style:{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:'14px'},onClick:()=>{log.medications.splice(i,1);render();}},'✕'):''
    );
    medSec.appendChild(row);
  });
  medSec.appendChild(h('button',{className:'btn-add',onClick:()=>{log.medications.push({presetId:null,name:'',dose:'',timing:'',taken:true,note:''});render();}},'＋ 臨時追加'));
  app.appendChild(medSec);

  // Exercise Section
  const exSec=createSection('運動','var(--blue)');
  // Rest day toggle
  exSec.appendChild(h('button',{style:{width:'100%',padding:'10px 14px',borderRadius:'10px',border:'none',fontSize:'13px',cursor:'pointer',fontWeight:600,textAlign:'left',background:log.restDay?'rgba(100,116,139,0.08)':'var(--border)',color:log.restDay?'var(--t2)':'var(--t3)',display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'},onClick:()=>{log.restDay=!log.restDay;if(log.restDay){log.selectedWorkouts=[];log.exercises=[];}render();}},
    h('span',{style:{width:'20px',height:'20px',borderRadius:'6px',display:'flex',alignItems:'center',justifyContent:'center',background:log.restDay?'var(--t3)':'var(--border2)',color:'#fff',fontSize:'11px'}},log.restDay?'✓':''),
    '今日は休み'
  ));
  if(!log.restDay){
    state.settings.exercisePresets.forEach(pr=>{
      const active=(log.selectedWorkouts||[]).includes(pr.id);
      exSec.appendChild(h('button',{style:{width:'100%',padding:'10px 14px',borderRadius:'10px',border:'none',fontSize:'13px',cursor:'pointer',fontWeight:600,textAlign:'left',background:active?'rgba(56,189,248,0.08)':'var(--border)',color:active?'var(--blue)':'var(--t2)',display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'},onClick:()=>{
        const sel=log.selectedWorkouts||[];
        if(sel.includes(pr.id)){
          log.selectedWorkouts=sel.filter(x=>x!==pr.id);
          log.exercises=[];
          log.selectedWorkouts.forEach(id=>{const p=state.settings.exercisePresets.find(x=>x.id===id);if(p)log.exercises.push(...p.items.map(i=>({...i,done:false})));});
        }else{
          log.selectedWorkouts=[...sel,pr.id];
          log.exercises.push(...pr.items.map(i=>({...i,done:false})));
        }
        log.restDay=false;render();
      }},
        h('span',{style:{width:'20px',height:'20px',borderRadius:'6px',display:'flex',alignItems:'center',justifyContent:'center',background:active?'var(--blue)':'var(--border2)',color:'#fff',fontSize:'11px'}},active?'✓':''),
        pr.name
      ));
    });
    if(log.exercises.length>0){
      const list=h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:'12px',marginTop:'8px'}});
      log.exercises.forEach((ex,i)=>{
        list.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'9px 12px',borderRadius:'8px',marginBottom:'4px',cursor:'pointer',background:ex.done?'rgba(56,189,248,0.04)':'transparent',border:ex.done?'1px solid rgba(56,189,248,0.13)':'1px solid transparent'},onClick:()=>{log.exercises[i].done=!log.exercises[i].done;render();}},
          h('span',{style:{width:'20px',height:'20px',borderRadius:'5px',display:'flex',alignItems:'center',justifyContent:'center',background:ex.done?'var(--blue)':'var(--border2)',color:'#fff',fontSize:'11px',flexShrink:0}},ex.done?'✓':''),
          h('span',{style:{fontSize:'13px',fontWeight:500,color:ex.done?'#7dd3fc':'var(--t2)',flex:1}},ex.name),
          h('span',{style:{fontSize:'11px',color:'var(--t4)',fontFamily:'var(--mono)'}},`${ex.weight||''} ${ex.reps||''}`.trim())
        ));
      });
      list.appendChild(h('div',{style:{fontSize:'11px',color:'var(--t4)',textAlign:'right',marginTop:'6px',fontFamily:'var(--mono)'}},`${log.exercises.filter(e=>e.done).length}/${log.exercises.length} 完了`));
      exSec.appendChild(list);
    }
  }
  app.appendChild(exSec);

  // Sleep Section
  const slSec=createSection('睡眠','var(--violet)');

    h('div',{style:{flex:1}},h('label',{style:{fontSize:'11px',color:'var(--t3)',display:'block',marginBottom:'4px'}},'就寝'),h('input',{type:'time',className:'inp',value:log.sleep.bedtime,onInput:e=>{log.sleep.bedtime=e.target.value;}})),

async function renderDashboard(app){
  // Load data
  const entries=[];const today=new Date();
  for(let i=state.dashRange-1;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);const ds=fd(d);
    const log=await dbGet('log:'+ds);
    if(log){
      let sleepH=0;const sl=log.sleep||{};
      if(sl.bedtime&&sl.wakeup){const[bh,bm]=sl.bedtime.split(':').map(Number);const[wh,wm]=sl.wakeup.split(':').map(Number);let m=(wh*60+wm)-(bh*60+bm);if(m<0)m+=1440;sleepH=+(m/60).toFixed(1);}
      entries.push({date:ds,label:`${d.getMonth()+1}/${d.getDate()}`,p:log.evaluation?.productivity||0,m:log.evaluation?.mental||0,mood:log.journal?.moodScore||0,sleepH,sleepQ:sl.quality||0,restDay:!!log.restDay,workouts:(log.selectedWorkouts||[]).map(id=>{const f=state.settings.exercisePresets.find(p=>p.id===id);return f?f.name.replace(/Day \w+ — /,''):'?';}),meds:(log.medications||[]).filter(x=>x.taken).map(x=>x.name)});
    }
  }

  // Range selector
  const rangeSel=h('div',{style:{display:'flex',gap:'4px',marginBottom:'16px',background:'var(--bg2)',borderRadius:'10px',padding:'3px',border:'1px solid var(--border)'}},
    ...[{v:7,l:'1週間'},{v:14,l:'2週間'},{v:30,l:'1ヶ月'},{v:90,l:'3ヶ月'}].map(r=>
      h('button',{style:{flex:1,padding:'7px 0',border:'none',borderRadius:'8px',background:state.dashRange===r.v?'var(--border)':'transparent',color:state.dashRange===r.v?'var(--t1)':'var(--t3)',fontSize:'12px',fontWeight:600,cursor:'pointer'},onClick:()=>{state.dashRange=r.v;render();}},r.l)
    )
  );
  app.appendChild(rangeSel);

  if(!entries.length){
    app.appendChild(h('div',{style:{textAlign:'center',padding:'40px 0',color:'var(--t3)'}},h('p',{style:{fontSize:'14px'}},'まだデータがありません。'),h('p',{style:{fontSize:'12px'}},'記録を保存するとグラフが表示されます。')));
    return;
  }

  // 1. Trend chart
  const trendSec=createSection('スコア推移','var(--green)');
  trendSec.appendChild(createSVGLineChart(entries,['p','m','mood'],['var(--green)','var(--purple)','var(--yellow)'],['生産性','メンタル','気分']));
  app.appendChild(trendSec);

  // 2. Sleep scatter
  const sleepSec=createSection('睡眠 vs パフォーマンス','var(--violet)');
  sleepSec.appendChild(h('div',{style:{fontSize:'11px',color:'var(--t3)',marginBottom:'4px'}},'睡眠時間 × 生産性'));
  sleepSec.appendChild(createScatter(entries,'sleepH','p',12,10,'var(--green)'));
  sleepSec.appendChild(h('div',{style:{fontSize:'11px',color:'var(--t3)',marginBottom:'4px',marginTop:'12px'}},'睡眠の質 × メンタル'));
  sleepSec.appendChild(createScatter(entries,'sleepQ','m',5,10,'var(--purple)'));
  app.appendChild(sleepSec);

  // 3. Workout comparison
  const wkMap={};
  entries.forEach(d=>{
    if(d.restDay){if(!wkMap['休み'])wkMap['休み']={p:[],m:[]};wkMap['休み'].p.push(d.p);wkMap['休み'].m.push(d.m);}
    d.workouts.forEach(w=>{if(!wkMap[w])wkMap[w]={p:[],m:[]};wkMap[w].p.push(d.p);wkMap[w].m.push(d.m);});
    if(!d.restDay&&!d.workouts.length){if(!wkMap['なし'])wkMap['なし']={p:[],m:[]};wkMap['なし'].p.push(d.p);wkMap['なし'].m.push(d.m);}
  });
  if(Object.keys(wkMap).length>0){
    const wkBars=Object.entries(wkMap).map(([name,v])=>({name:name.length>6?name.slice(0,6)+'…':name,avgP:+(v.p.reduce((a,b)=>a+b,0)/v.p.length).toFixed(1),avgM:+(v.m.reduce((a,b)=>a+b,0)/v.m.length).toFixed(1),n:v.p.length}));
    const wkSec=createSection('運動メニュー別','var(--blue)');
    wkSec.appendChild(createBarChart(wkBars,['avgP','avgM'],['var(--green)','var(--purple)'],['生産性','メンタル']));
    app.appendChild(wkSec);
  }

  // 4. Stats summary
  const statSec=createSection('期間サマリー','var(--yellow)');
  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}});
  [{l:'平均生産性',v:(entries.reduce((s,d)=>s+d.p,0)/entries.length).toFixed(1),c:'var(--green)'},
   {l:'平均メンタル',v:(entries.reduce((s,d)=>s+d.m,0)/entries.length).toFixed(1),c:'var(--purple)'},
   {l:'平均気分',v:(entries.reduce((s,d)=>s+d.mood,0)/entries.length).toFixed(1),c:'var(--yellow)'},
   {l:'平均睡眠',v:(entries.reduce((s,d)=>s+d.sleepH,0)/entries.length).toFixed(1)+'h',c:'var(--violet)'},
   {l:'運動日数',v:entries.filter(d=>d.workouts.length>0).length+'/'+entries.length,c:'var(--blue)'},
   {l:'記録日数',v:entries.length+'日',c:'var(--orange)'}
  ].forEach(s=>{
    grid.appendChild(h('div',{style:{textAlign:'center',padding:'10px 8px',background:'var(--bg2)',borderRadius:'10px',border:'1px solid var(--border)'}},
      h('div',{style:{fontSize:'20px',fontWeight:700,color:s.c,fontFamily:'var(--mono)'}},s.v),
      h('div',{style:{fontSize:'10px',color:'var(--t3)',marginTop:'2px'}},s.l)
    ));
  });
  statSec.appendChild(grid);
  app.appendChild(statSec);
}

function renderCalendar(app){
  const DAYS=['日','月','火','水','木','金','土'];
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const y=state.calMonth.getFullYear(),mo=state.calMonth.getMonth();
  const nav=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}},
    h('button',{className:'btn-nav',onClick:()=>{state.calMonth=new Date(y,mo-1,1);render();}},'◀'),
    h('span',{style:{fontSize:'18px',fontWeight:700,color:'var(--t1)',fontFamily:'var(--mono)'}},`${y}年 ${MONTHS[mo]}`),
    h('button',{className:'btn-nav',onClick:()=>{state.calMonth=new Date(y,mo+1,1);render();}},'▶')
  );
  app.appendChild(nav);

  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px'}});
  DAYS.forEach(d=>grid.appendChild(h('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--t3)',fontWeight:600,padding:'4px 0'}},d)));
  const firstDay=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate();
  for(let i=0;i<firstDay;i++)grid.appendChild(h('div',{}));
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data=state.logDates[ds];const isT=ds===fd(new Date());
    const cell=h('div',{style:{aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'3px',borderRadius:'10px',cursor:'pointer',background:data?'var(--border)':'transparent',border:isT?'1px solid var(--green)':'1px solid transparent'},onClick:()=>{state.selDate=ds;state.view='record';loadLog(ds).then(()=>{renderTabs();render();});}},
      h('span',{style:{fontSize:'13px',fontWeight:isT?700:400,color:data?'var(--t1)':'var(--t4)',fontFamily:'var(--mono)'}},String(d))
    );
    if(data){
      const dots=h('div',{style:{display:'flex',gap:'3px'}});
      const pPct=(data.p/10)*100,mPct=(data.m/10)*100;
      dots.appendChild(h('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:`conic-gradient(var(--green) ${pPct}%,#333 ${pPct}%)`}}));
      dots.appendChild(h('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:`conic-gradient(var(--purple) ${mPct}%,#333 ${mPct}%)`}}));
      cell.appendChild(dots);
    }
    grid.appendChild(cell);
  }
  app.appendChild(grid);
}

function createSlider(label,value,min,max,color,onChange){
  const container=h('div',{style:{marginBottom:'16px'}});
  const header=h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},
    h('span',{style:{fontSize:'13px',color:'var(--t2)'}},label),
    h('span',{style:{fontSize:'20px',fontWeight:700,color,fontFamily:'var(--mono)'}},String(value))
  );
  const slider=h('input',{type:'range',min:String(min),max:String(max),value:String(value),style:{width:'100%',accentColor:color},onInput:e=>onChange(Number(e.target.value))});
  const ticks=h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'var(--t4)',marginTop:'2px'}},
    h('span',{},String(min)),h('span',{},String(max)));
  container.append(header,slider,ticks);
  return container;
}

function createSVGLineChart(data,keys,colors,labels){
  if(data.length<2)return h('p',{style:{fontSize:'12px',color:'var(--t4)',textAlign:'center'}},'2日以上のデータが必要です');
  const pts=data.length,w=100,ht=20,pad=2;
  let svg=`<svg viewBox="0 0 ${w} ${ht}" style="width:100%;height:180px;" preserveAspectRatio="none">`;
  keys.forEach((k,ki)=>{
    let path='';
    data.forEach((d,i)=>{const x=pad+(i/(pts-1))*(w-pad*2);const y=ht-pad-(d[k]/10)*(ht-pad*2);path+=`${i===0?'M':'L'}${x},${y} `;});
    svg+=`<path d="${path}" fill="none" stroke="${colors[ki]}" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round"/>`;
    data.forEach((d,i)=>{const x=pad+(i/(pts-1))*(w-pad*2);const y=ht-pad-(d[k]/10)*(ht-pad*2);svg+=`<circle cx="${x}" cy="${y}" r="0.7" fill="${colors[ki]}"/>`;});
  });
  svg+='</svg>';
  const container=h('div',{});
  container.appendChild(h('div',{innerHTML:svg}));
  // X labels
  const xlabels=h('div',{style:{display:'flex',justifyContent:'space-between',padding:'0 4px'}});
  const step=Math.max(1,Math.floor(pts/7));
  data.forEach((d,i)=>{if(i%step===0||i===pts-1)xlabels.appendChild(h('span',{style:{fontSize:'9px',color:'var(--t4)'}},d.label));});
  container.appendChild(xlabels);
  // Legend
  const legend=h('div',{style:{display:'flex',gap:'12px',justifyContent:'center',marginTop:'8px'}});
  labels.forEach((l,i)=>legend.appendChild(h('span',{style:{fontSize:'9px',color:colors[i],display:'flex',alignItems:'center',gap:'3px'}},h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:colors[i],display:'inline-block'}}),l)));
  container.appendChild(legend);
  return container;
}

function createScatter(data,xKey,yKey,xMax,yMax,color){
  if(data.length<2)return h('p',{style:{fontSize:'12px',color:'var(--t4)',textAlign:'center'}},'2日以上のデータが必要です');
  const w=100,ht=60,pad=8;
  let svg=`<svg viewBox="0 0 ${w} ${ht}" style="width:100%;height:140px;">`;
  svg+=`<line x1="${pad}" y1="${ht-pad}" x2="${w-pad}" y2="${ht-pad}" stroke="#1e293b" stroke-width="0.3"/>`;
  svg+=`<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${ht-pad}" stroke="#1e293b" stroke-width="0.3"/>`;
  data.filter(d=>d[xKey]>0).forEach(d=>{
    const x=pad+(d[xKey]/xMax)*(w-pad*2);const y=ht-pad-(d[yKey]/yMax)*(ht-pad*2);
    svg+=`<circle cx="${x}" cy="${y}" r="2" fill="${color}" opacity="0.7"/>`;
  });
  svg+='</svg>';
  return h('div',{innerHTML:svg});
}

function createBarChart(items,valueKeys,colors,labels){
  const container=h('div',{});
  const bars=h('div',{style:{display:'flex',alignItems:'flex-end',gap:'8px',height:'140px',padding:'0 4px',justifyContent:'center'}});
  const bw=Math.max(20,Math.min(50,280/(items.length*valueKeys.length)));
  items.forEach(item=>{
    const col=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}});
    const barGroup=h('div',{style:{display:'flex',gap:'2px',alignItems:'flex-end'}});
    valueKeys.forEach((k,ki)=>{
      barGroup.appendChild(h('div',{style:{width:bw+'px',borderRadius:'4px 4px 0 0',background:colors[ki],height:Math.max(4,item[k]/10*100)+'px',transition:'height 0.3s'}}));
    });
    col.append(barGroup,
      h('span',{style:{fontSize:'9px',color:'var(--t3)',textAlign:'center',maxWidth:(bw*2+8)+'px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},item.name),
      h('span',{style:{fontSize:'8px',color:'var(--t4)'}},'n='+item.n)
    );
    bars.appendChild(col);
  });
  container.appendChild(bars);
  const legend=h('div',{style:{display:'flex',gap:'12px',justifyContent:'center',marginTop:'8px'}});
  labels.forEach((l,i)=>legend.appendChild(h('span',{style:{fontSize:'9px',color:colors[i],display:'flex',alignItems:'center',gap:'3px'}},h('span',{style:{width:'6px',height:'6px',borderRadius:'2px',background:colors[i],display:'inline-block'}}),l)));
  container.appendChild(legend);
  return container;
}

async function handleSave(){
  const log=state.log;
  try{
    await dbSet('log:'+state.selDate,JSON.parse(JSON.stringify(log)));
    // med history
    const newE=log.medications.map(m=>({date:state.selDate,name:m.name,dose:m.dose,timing:m.timing,taken:m.taken}));
    const exist=state.medHist.filter(h=>h.date!==state.selDate);
    state.medHist=[...exist,...newE];
    await dbSet(MHKEY,state.medHist);
    await refreshLogDates();
    showToast('保存しました');
    render();
    // AI
    if(state.settings.apiKey)requestAI();
  }catch(e){showToast('保存に失敗しました');console.error(e);}
}

async function requestAI(){
  state.aiLoading=true;state.aiInsight=null;render();
  try{
    const recent=[];
    for(let i=1;i<=7;i++){const d=new Date(state.selDate);d.setDate(d.getDate()-i);const log=await dbGet('log:'+fd(d));if(log)recent.push({date:fd(d),...log});}
    const recentStr=recent.map(r=>`${r.date}: P${r.evaluation?.productivity||'?'} M${r.evaluation?.mental||'?'} 睡眠質${r.sleep?.quality||'?'} 気分${r.journal?.moodScore||'?'}`).join('\n');
    const log=state.log;const sl=log.sleep||{};
    const prompt=`あなたはウェルネスAIコーチです。JSON形式のみで回答してください。
{"feedback":"今日の記録へのフィードバック(2-3文)","tomorrow_prediction":{"productivity":数値1-10,"mental":数値1-10,"condition":"体調予測"},"recommendation":"明日へのアドバイス(1-2文)","journal_tags":["日記から抽出タグ3-5個"],"journal_summary":"日記1行要約"}

今日 ${state.selDate}: 服薬:${(log.medications||[]).filter(m=>m.taken).map(m=>m.name).join(',')||'なし'} 運動:${log.restDay?'休み':log.exercises?.length+'種目'} 睡眠:${sl.bedtime}→${sl.wakeup} 質${sl.quality}/5 日記:${log.journal?.text||'なし'} 気分${log.journal?.moodScore}/10 P${log.evaluation?.productivity}/10 M${log.evaluation?.mental}/10
直近7日:
${recentStr||'なし'}`;

    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    state.aiInsight=JSON.parse(text.replace(/```json|```/g,'').trim());
    // save tags back
    if(state.aiInsight.journal_tags){state.log.journal.autoTags=state.aiInsight.journal_tags;state.log.journal.summary=state.aiInsight.journal_summary;await dbSet('log:'+state.selDate,JSON.parse(JSON.stringify(state.log)));}
  }catch(e){console.error('AI error:',e);state.aiInsight={feedback:'API接続に失敗しました。設定タブでAPIキーを確認してください。',tomorrow_prediction:null,recommendation:null};}
  state.aiLoading=false;render();
}

async function saveSettings(){await dbSet(SKEY,state.settings);}

async function pasteSleep(){
  try{
    const text=await navigator.clipboard.readText();let data={};
    if(text.includes(':')){
      if(text.includes('bedtime:')||text.includes('deep:')||text.includes('hr:')){
        text.split(',').forEach(pair=>{const idx=pair.indexOf(':');if(idx===-1)return;data[pair.substring(0,idx).trim()]=pair.substring(idx+1).trim();});
      }else{const parts=text.trim().split(',').map(s=>s.trim());if(parts.length>=2){data.bedtime=parts[0];data.wakeup=parts[1];}if(parts.length>=3)data.quality=parts[2];}
    }
    if(!data.bedtime&&!data.deep&&!data.hr){showToast('形式が不正です');return;}
    let autoQ=null;
    if(data.deep||data.rem||data.hr){
      let sc=3;const deep=parseInt(data.deep)||0,rem=parseInt(data.rem)||0,tot=deep+rem+(parseInt(data.core)||0)+(parseInt(data.awake)||0);
      if(tot>0){const dp=deep/tot,rp=rem/tot;if(dp>=0.15&&rp>=0.20)sc=5;else if(dp>=0.12&&rp>=0.15)sc=4;else if(dp>=0.08||rp>=0.12)sc=3;else sc=2;if((parseInt(data.awake)||0)/tot>0.15)sc=Math.max(1,sc-1);}
      const hr=parseInt(data.hr)||0;if(hr>0&&hr<50)sc=Math.min(5,sc+1);if(hr>70)sc=Math.max(1,sc-1);autoQ=sc;
    }
    const quality=data.quality?parseInt(data.quality):autoQ;
    const sl=state.log.sleep;
    if(data.bedtime)sl.bedtime=data.bedtime;if(data.wakeup)sl.wakeup=data.wakeup;if(quality)sl.quality=quality;
    sl.deep=parseInt(data.deep)||null;sl.rem=parseInt(data.rem)||null;sl.core=parseInt(data.core)||null;sl.awake=parseInt(data.awake)||null;sl.hr=parseInt(data.hr)||null;sl.resp=parseInt(data.resp)||null;
    showToast(autoQ?'睡眠データ+自動質スコアを取り込みました':'睡眠データを取り込みました');render();
  }catch{showToast('クリップボードを読み取れませんでした');}
}
