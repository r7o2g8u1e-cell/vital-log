<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#05080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vital Log">
<link rel="manifest" href="./manifest.json">
<title>Vital Log</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;--bg2:#0b1120;--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);
  --glassBorder:rgba(255,255,255,0.08);--glassBorder2:rgba(255,255,255,0.12);
  --glassHi:rgba(255,255,255,0.15);--t1:#f0f2f5;--t2:#9ca3b4;--t3:#5b6378;--t4:#3a4155;
  --green:#6ee7b7;--purple:#818cf8;--pink:#f472b6;--blue:#38bdf8;
  --yellow:#fbbf24;--violet:#a78bfa;--orange:#fb923c;--red:#f87171;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans JP',system-ui,sans-serif;
  --blur:saturate(180%) blur(20px);--blur2:saturate(150%) blur(12px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans);color:var(--t1);min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(110,231,183,0.08),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(129,140,248,0.06),transparent);
}
input,select,textarea,button{font-family:inherit;color:var(--t1);}
::placeholder{color:var(--t4);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
input[type=range]{appearance:none;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 0 12px rgba(110,231,183,0.4),inset 0 1px 0 rgba(255,255,255,0.3);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Liquid Glass Components */
.glass{
  background:var(--glass);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  border:1px solid var(--glassBorder);border-radius:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06);
  padding:20px;margin-bottom:16px;position:relative;overflow:hidden;
}
.glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
}
.glass-sm{
  background:var(--glass);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  border:1px solid var(--glassBorder);border-radius:12px;padding:10px 14px;
}
.glass-input{
  background:rgba(255,255,255,0.03);border:1px solid var(--glassBorder);border-radius:10px;
  padding:9px 14px;font-size:13px;outline:none;width:100%;color:var(--t1);
  transition:border-color 0.2s,box-shadow 0.2s;
}
.glass-input:focus{border-color:var(--glassBorder2);box-shadow:0 0 0 3px rgba(110,231,183,0.08);}
.btn-glass{
  background:var(--glass2);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  border:1px solid var(--glassBorder);border-radius:10px;padding:8px 16px;
  font-size:13px;cursor:pointer;font-weight:500;color:var(--t2);transition:all 0.2s;
}
.btn-glass:active{transform:scale(0.97);background:var(--glassHi);}
.btn-add{
  width:100%;padding:10px 0;border:1px dashed var(--glassBorder2);border-radius:12px;
  background:transparent;color:var(--t3);font-size:13px;cursor:pointer;font-weight:500;margin-top:6px;
}
.btn-primary{
  width:100%;padding:16px 0;border:none;border-radius:16px;font-size:16px;font-weight:700;
  cursor:pointer;letter-spacing:0.04em;font-family:var(--mono);transition:all 0.2s;
  background:linear-gradient(135deg,var(--green),var(--purple));color:var(--bg);
  box-shadow:0 4px 24px rgba(110,231,183,0.25),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:active{transform:scale(0.98);}
.sec-title{
  margin:0;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  font-family:var(--mono);display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  padding:10px 24px;border-radius:14px;font-size:14px;font-weight:600;z-index:999;
  font-family:var(--mono);animation:fadeUp 0.3s ease;
  background:rgba(15,23,42,0.9);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(110,231,183,0.2);color:var(--green);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.modal-box{
  background:rgba(11,17,32,0.95);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glassBorder2);border-radius:24px;padding:24px;
  width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.5);
  position:relative;overflow:hidden;
}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);}
.tab-bar{display:flex;gap:3px;background:var(--glass);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);border-radius:14px;padding:3px;border:1px solid var(--glassBorder);}
.tab-btn{flex:1;padding:9px 0;border:none;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--t3);}
.tab-btn.active{background:var(--glass2);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.06);}
#app{max-width:480px;margin:0 auto;padding:12px 16px 100px;}
</style>
</head>
<body>

<div id="header" style="padding:16px 20px 8px;position:sticky;top:0;z-index:100;backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);background:rgba(5,8,15,0.7);max-width:480px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div>
      <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--green),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--mono);">Vital Log</h1>
      <p style="font-size:10px;color:var(--t4);letter-spacing:0.12em;font-family:var(--mono);margin-top:2px;">DAILY WELLNESS TRACKER</p>
    </div>
    <div id="date-badge" style="padding:6px 14px;border-radius:10px;font-size:13px;color:var(--t2);font-family:var(--mono);display:none;background:var(--glass);border:1px solid var(--glassBorder);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);"></div>
  </div>
  <div class="tab-bar" style="margin-top:12px;" id="tabs"></div>
</div>

<div id="app"></div>
<div id="toast-container"></div>
<div id="modal-container"></div>

<script>
/* Global error handler */
window.onerror=function(msg,url,line,col,err){
  document.getElementById('app').innerHTML='<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;word-break:break-all;"><p style="font-size:14px;margin-bottom:8px;">JavaScript Error</p><p>'+msg+'</p><p>Line: '+line+' Col: '+col+'</p></div>';
};
window.addEventListener('unhandledrejection',function(e){
  document.getElementById('app').innerHTML='<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;word-break:break-all;"><p style="font-size:14px;margin-bottom:8px;">Promise Error</p><p>'+String(e.reason)+'</p></div>';
});
/* ═══ IndexedDB ═══ */
const DB='VitalLogDB';let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{e.target.result.createObjectStore('kv');};r.onsuccess=e=>{db=e.target.result;res();};r.onerror=rej;});}
function dbG(k){return new Promise(r=>{const t=db.transaction('kv','readonly');const s=t.objectStore('kv');const q=s.get(k);q.onsuccess=()=>r(q.result??null);q.onerror=()=>r(null);});}
function dbS(k,v){return new Promise((r,j)=>{const t=db.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=r;t.onerror=j;});}
function dbD(k){return new Promise(r=>{const t=db.transaction('kv','readwrite');t.objectStore('kv').delete(k);t.oncomplete=r;t.onerror=r;});}
function dbK(pfx=''){return new Promise(r=>{const t=db.transaction('kv','readonly');const q=t.objectStore('kv').getAllKeys();q.onsuccess=()=>r((q.result||[]).filter(k=>typeof k==='string'&&k.startsWith(pfx)));q.onerror=()=>r([]);});}

/* ═══ State ═══ */
const SKEY='settings',MHKEY='med-hist';
const DTAGS=["ストレス","リラックス","不安","充実"];
const defEx=[
  {id:"wp1",name:"Day A — 腕・前腕",items:[{name:"前腕_上",weight:"5kg",reps:"10回×3",note:""},{name:"前腕_下",weight:"6kg",reps:"10回×3",note:"次回重量up"},{name:"上腕二頭筋",weight:"7kg",reps:"10回×3",note:""},{name:"上腕三頭筋",weight:"6kg",reps:"10回×3",note:""}]},
  {id:"wp2",name:"Day B — ベンチ・レッグ",items:[{name:"ベンチプレス",weight:"35kg",reps:"",note:""},{name:"レッグプレス&ふくらはぎ",weight:"114kg",reps:"",note:""}]},
  {id:"wp3",name:"Day C — 有酸素・チェスト",items:[{name:"ランニング",weight:"",reps:"20min",note:"ルーティン"},{name:"バーチカルチェストプレス",weight:"34kg",reps:"",note:""},{name:"リアルデルトペックフライ",weight:"20kg",reps:"",note:""},{name:"リカバリーウォーキング",weight:"",reps:"10分",note:"速さ4.6"}]},
  {id:"wp4",name:"Day D — 積極的休養（水泳）",items:[{name:"アップ（平泳ぎ/背泳ぎ）",weight:"",reps:"200m",note:"ゆるく"},{name:"メイン 50m×10本",weight:"",reps:"500m",note:"呼吸が上がらないペース / 休憩15〜30秒"},{name:"ダウン",weight:"",reps:"100〜200m",note:""}]},
];
const defS={presetMeds:[{id:"m1",name:"薬A",dose:"10mg",timing:"朝"},{id:"m2",name:"薬B",dose:"5mg",timing:"夜"}],customTags:[],exercisePresets:JSON.parse(JSON.stringify(defEx)),apiKey:""};
function mkLog(){return{medications:[],selectedWorkouts:[],restDay:false,exercises:[],sleep:{bedtime:"23:00",wakeup:"07:00",quality:3,note:"",deep:null,rem:null,core:null,awake:null,hr:null,resp:null,restHr:null},journal:{text:"",moodScore:5,tags:[],autoTags:null,summary:null},evaluation:{productivity:5,mental:5},skipped:{}};}
let S={view:'record',date:fd(new Date()),log:mkLog(),sets:JSON.parse(JSON.stringify(defS)),mh:[],ld:{},dr:7,dd:[],cm:new Date(),ai:null,ail:false,exEd:null,sTab:'meds'};
function fd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

/* ═══ Toast ═══ */
function toast(m){document.getElementById('toast-container').innerHTML=`<div class="toast">${m}</div>`;setTimeout(()=>{document.getElementById('toast-container').innerHTML='';},2500);}

/* ═══ DOM helper ═══ */
function h(t,a,...c){const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else if(k==='value'&&(t==='input'||t==='textarea'||t==='select'))e.value=v;else if(k==='checked')e.checked=v;else if(k==='innerHTML')e.innerHTML=v;else if(k==='htmlFor')e.htmlFor=v;else e.setAttribute(k,v);});c.flat(9).forEach(x=>{if(x==null||x===false)return;e.appendChild(typeof x==='string'||typeof x==='number'?document.createTextNode(String(x)):x);});return e;}

/* ═══ URL Param Auto-Import ═══ */
function checkURLParams(){
  const p=new URLSearchParams(window.location.search);
  let imported=false;
  if(p.has('bedtime')){S.log.sleep.bedtime=p.get('bedtime');imported=true;}
  if(p.has('wakeup')){S.log.sleep.wakeup=p.get('wakeup');imported=true;}
  if(p.has('deep')){S.log.sleep.deep=+p.get('deep');imported=true;}
  if(p.has('rem')){S.log.sleep.rem=+p.get('rem');imported=true;}
  if(p.has('core')){S.log.sleep.core=+p.get('core');imported=true;}
  if(p.has('awake')){S.log.sleep.awake=+p.get('awake');imported=true;}
  if(p.has('hr')){S.log.sleep.hr=+p.get('hr');imported=true;}
  if(p.has('resthr')){S.log.sleep.restHr=+p.get('resthr');imported=true;}
  if(p.has('resp')){S.log.sleep.resp=+p.get('resp');imported=true;}
  if(imported){
    // auto-calc quality
    const sl=S.log.sleep;
    if(sl.deep||sl.rem){
      let sc=3;const tot=(sl.deep||0)+(sl.rem||0)+(sl.core||0)+(sl.awake||0);
      if(tot>0){const dp=(sl.deep||0)/tot,rp=(sl.rem||0)/tot;if(dp>=0.15&&rp>=0.20)sc=5;else if(dp>=0.12&&rp>=0.15)sc=4;else if(dp>=0.08||rp>=0.12)sc=3;else sc=2;if(((sl.awake||0)/tot)>0.15)sc=Math.max(1,sc-1);}
      if(sl.hr&&sl.hr<50)sc=Math.min(5,sc+1);if(sl.hr&&sl.hr>70)sc=Math.max(1,sc-1);
      sl.quality=sc;
    }
    // clean URL
    window.history.replaceState({},'',window.location.pathname);
    toast('ヘルスケアデータを自動取り込みました');
  }
}

/* ═══ Init ═══ */
async function init(){
  try{
    await openDB();
    const s=await dbG(SKEY);if(s)S.sets={...JSON.parse(JSON.stringify(defS)),...s,exercisePresets:s.exercisePresets||JSON.parse(JSON.stringify(defEx))};
    const m=await dbG(MHKEY);if(m)S.mh=m;
    await rLD();await loadLog(S.date);
    checkURLParams();
    renderTabs();render();
    if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;word-break:break-all;"><p style="font-size:16px;margin-bottom:12px;">起動エラー</p><p>'+String(e)+'</p><p style="margin-top:8px;">'+String(e.stack||'').replace(/\n/g,'<br>')+'</p></div>';
    console.error('Init error:',e);
  }
}
async function rLD(){const keys=await dbK('log:');const m={};for(const k of keys){const d=await dbG(k);if(d)m[k.replace('log:','')]={p:d.evaluation?.productivity||0,m:d.evaluation?.mental||0};}S.ld=m;}
async function loadLog(date){const d=await dbG('log:'+date);if(d){S.log={...mkLog(),...d,selectedWorkouts:d.selectedWorkouts||[],skipped:d.skipped||{},restDay:!!d.restDay,journal:{...mkLog().journal,...(d.journal||{})},sleep:{...mkLog().sleep,...(d.sleep||{})}};}else{S.log=mkLog();S.log.medications=S.sets.presetMeds.map(p=>({presetId:p.id,name:p.name,dose:p.dose,timing:p.timing,taken:false,note:""}));}S.ai=null;S.exEd=null;}
function renderTabs(){const el=document.getElementById('tabs');el.innerHTML='';[{id:'record',l:'記録'},{id:'dash',l:'分析'},{id:'history',l:'履歴'},{id:'settings',l:'設定'}].forEach(t=>{const b=document.createElement('button');b.className='tab-btn'+(S.view===t.id?' active':'');b.textContent=t.l;b.onclick=()=>{S.view=t.id;renderTabs();render();};el.appendChild(b);});}

/* ═══ Main Render ═══ */
async function render(){
  const app=document.getElementById('app');const badge=document.getElementById('date-badge');
  badge.style.display=S.view==='record'?'block':'none';badge.textContent=S.date;
  app.innerHTML='';app.style.animation='fadeUp 0.2s ease';
  try{
    switch(S.view){case 'record':renderRec(app);break;case 'dash':await renderDash(app);break;case 'history':renderCal(app);break;case 'settings':renderSets(app);break;}
  }catch(e){
    app.innerHTML='<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;word-break:break-all;"><p style="font-size:14px;margin-bottom:8px;">描画エラー ('+S.view+')</p><p>'+String(e)+'</p><p style="margin-top:8px;">'+String(e.stack||'').replace(/\n/g,'<br>')+'</p></div>';
    console.error('Render error:',e);
  }
}

/* ═══ Glass Section ═══ */
function sec(title,color,parent,extra){
  const s=h('div',{className:'glass'});
  const hd=h('div',{className:'sec-title',style:{color}},title,h('div',{style:{flex:1,height:'1px',background:`linear-gradient(90deg,${color}33,transparent)`}}));
  if(extra)hd.appendChild(extra);
  s.appendChild(hd);parent.appendChild(s);return s;
}
function slider(label,val,min,max,color,onChange){
  const c=h('div',{style:{marginBottom:'16px'}});
  c.append(
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},h('span',{style:{fontSize:'13px',color:'var(--t2)'}},label),h('span',{style:{fontSize:'20px',fontWeight:700,color,fontFamily:'var(--mono)'}},String(val))),
    h('input',{type:'range',min:String(min),max:String(max),value:String(val),style:{width:'100%',accentColor:color},onInput:e=>onChange(+e.target.value)}),
    h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'var(--t4)',marginTop:'2px'}},h('span',{},String(min)),h('span',{},String(max)))
  );return c;
}

/* ═══ RECORD ═══ */
function renderRec(app){
  const L=S.log,today=new Date();
  // Streak
  let stk=0;for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(S.ld[fd(d)])stk++;else break;}
  if(stk>0){const badge=stk>=30?'MASTER':stk>=14?'GREAT':stk>=7?'NICE':'';
    app.appendChild(h('div',{className:'glass-sm',style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px',borderColor:'rgba(251,146,60,0.15)'}},
      h('span',{style:{fontSize:'13px',fontWeight:700,color:'var(--orange)',fontFamily:'var(--mono)'}},String(stk)),
      h('span',{style:{fontSize:'12px',color:'var(--t2)'}},'日連続記録中'),
      badge?h('span',{style:{marginLeft:'auto',fontSize:'10px',color:'var(--orange)',background:'rgba(251,146,60,0.1)',padding:'2px 8px',borderRadius:'8px',fontWeight:600}},badge):''
    ));}
  // Missed
  const missed=[];for(let i=1;i<=14;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(!S.ld[fd(d)])missed.push(fd(d));}
  if(missed.length){app.appendChild(h('div',{className:'glass-sm',style:{marginBottom:'16px',borderColor:'rgba(251,191,36,0.15)'}},
    h('span',{style:{fontSize:'12px',color:'var(--yellow)',fontWeight:600}},`直近14日間で${missed.length}日未記録`),
    h('div',{style:{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}},...missed.slice(0,5).map(d=>h('button',{className:'btn-glass',style:{fontSize:'10px',padding:'2px 8px'},onClick:()=>{S.date=d;loadLog(d).then(render);}},d.slice(5))))
  ));}
  // Date nav
  app.appendChild(h('div',{style:{display:'flex',justifyContent:'center',gap:'10px',marginBottom:'16px'}},
    h('button',{className:'btn-glass',onClick:()=>{const d=new Date(S.date);d.setDate(d.getDate()-1);S.date=fd(d);loadLog(S.date).then(render);}},'◀ 前日'),
    h('button',{className:'btn-glass',style:{background:S.date===fd(today)?'rgba(110,231,183,0.12)':'',color:S.date===fd(today)?'var(--green)':'var(--t2)'},onClick:()=>{S.date=fd(today);loadLog(S.date).then(render);}},'今日'),
    h('button',{className:'btn-glass',onClick:()=>{const d=new Date(S.date);d.setDate(d.getDate()+1);S.date=fd(d);loadLog(S.date).then(render);}},'翌日 ▶')
  ));

  // MEDS
  const ms=sec('服薬','var(--pink)',app);
  L.medications.forEach((m,i)=>{
    ms.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px',padding:'10px 12px',borderRadius:'12px',background:m.taken?'rgba(244,114,182,0.06)':'var(--glass)',border:`1px solid ${m.taken?'rgba(244,114,182,0.15)':'var(--glassBorder)'}`}},

  // Trend

      s.appendChild(card);
    });
    s.appendChild(h('button',{className:'btn-add',onClick:()=>{S.sets.exercisePresets.push({id:'wp'+Date.now(),name:'新しいメニュー',items:[{name:'',weight:'',reps:'',note:''}]});saveS();render();}},'＋ メニューを追加'));
  }

  if(S.sTab==='api'){
    const s=sec('Anthropic API','#c084fc',app);
    s.appendChild(h('p',{style:{fontSize:'12px',color:'var(--t3)',marginBottom:'12px'}},'AIインサイト機能に必要です。console.anthropic.com で取得。'));
    s.appendChild(h('input',{className:'glass-input',type:'password',value:S.sets.apiKey||'',placeholder:'sk-ant-...',style:{marginBottom:'8px'},onInput:e=>{S.sets.apiKey=e.target.value;saveS();}}));
    s.appendChild(h('p',{style:{fontSize:'11px',color:'var(--t4)'}},'キーはこのデバイスのIndexedDBにのみ保存されます。'));
  }

  if(S.sTab==='tags'){
    const s=sec('気分タグ','var(--yellow)',app);
    const tw=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'12px'}});
    DTAGS.forEach(t=>tw.appendChild(h('span',{style:{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',background:'var(--glass)',color:'var(--t3)',border:'1px solid var(--glassBorder)'}},t+'（固定）')));
    (S.sets.customTags||[]).forEach(t=>tw.appendChild(h('span',{style:{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',cursor:'pointer',background:'rgba(251,191,36,0.1)',color:'var(--yellow)',border:'1px solid rgba(251,191,36,0.2)'},onClick:()=>{S.sets.customTags=S.sets.customTags.filter(x=>x!==t);saveS();render();}},t+' ×')));
    s.appendChild(tw);
    s.appendChild(h('button',{className:'btn-add',onClick:()=>{const t=prompt('新しいタグ名:');if(t){S.sets.customTags=(S.sets.customTags||[]);S.sets.customTags.push(t);saveS();render();}}},'＋ タグを追加'));
  }

  if(S.sTab==='data'){
    const s=sec('データ管理','var(--red)',app);
    s.appendChild(h('div',{className:'glass-sm',style:{marginBottom:'16px'}},
      h('p',{style:{fontSize:'12px',color:'var(--t3)',marginBottom:'8px'}},'iOSショートカットからの自動取り込みURL形式:'),
      h('code',{style:{display:'block',fontSize:'10px',color:'var(--violet)',wordBreak:'break-all',lineHeight:'1.6'}},'https://あなたのURL/index.html?bedtime=23:30&wakeup=07:15&deep=45&rem=60&core=180&awake=15&hr=52&resthr=48&resp=14'),
      h('p',{style:{fontSize:'10px',color:'var(--t4)',marginTop:'8px'}},'ショートカットで「URLを開く」アクションにこの形式でパラメータを付けると自動入力されます。')
    ));
    s.appendChild(h('div',{className:'glass-sm',style:{marginBottom:'16px'}},
      h('p',{style:{fontSize:'12px',color:'var(--t3)',marginBottom:'4px'}},'データの保存場所:'),
      h('p',{style:{fontSize:'11px',color:'var(--t4)',lineHeight:'1.6'}},'すべてのデータはこのデバイスのブラウザ内（IndexedDB）にのみ保存されます。GitHub Pagesにはアプリコードのみがホストされ、入力データは一切送信されません。APIキーもデバイス内にのみ保管されます。')
    ));
    s.appendChild(h('button',{style:{width:'100%',padding:'10px',borderRadius:'12px',border:'1px solid rgba(153,27,27,0.4)',background:'rgba(127,29,29,0.15)',color:'#fca5a5',cursor:'pointer',fontSize:'13px',fontWeight:600,backdropFilter:'var(--blur2)',WebkitBackdropFilter:'var(--blur2)'},onClick:async()=>{if(!confirm('すべてのデータを削除しますか？'))return;const ks=await dbK('');for(const k of ks)await dbD(k);S.sets=JSON.parse(JSON.stringify(defS));S.ld={};S.mh=[];S.log=mkLog();toast('リセットしました');render();}},'全データをリセット'));
  }
}

/* ═══ CHART HELPERS ═══ */
function mkLine(data,keys,colors,labels){
  if(data.length<2)return h('p',{style:{fontSize:'12px',color:'var(--t4)',textAlign:'center'}},'2日以上のデータが必要です');
  const pts=data.length,w=100,ht=20,pad=2;
  let svg=`<svg viewBox="0 0 ${w} ${ht}" style="width:100%;height:180px;" preserveAspectRatio="none">`;
  keys.forEach((k,ki)=>{let path='';data.forEach((d,i)=>{const x=pad+(i/(pts-1))*(w-pad*2);const y=ht-pad-(d[k]/10)*(ht-pad*2);path+=`${i===0?'M':'L'}${x},${y} `;});
    svg+=`<path d="${path}" fill="none" stroke="${colors[ki]}" stroke-width="0.5" stroke-linecap="round" opacity="0.8"/>`;
    data.forEach((d,i)=>{const x=pad+(i/(pts-1))*(w-pad*2);const y=ht-pad-(d[k]/10)*(ht-pad*2);svg+=`<circle cx="${x}" cy="${y}" r="0.6" fill="${colors[ki]}"/>`;});});
  svg+='</svg>';
  const c=h('div',{});c.appendChild(h('div',{innerHTML:svg}));
  const xl=h('div',{style:{display:'flex',justifyContent:'space-between',padding:'0 4px'}});const step=Math.max(1,Math.floor(pts/7));
  data.forEach((d,i)=>{if(i%step===0||i===pts-1)xl.appendChild(h('span',{style:{fontSize:'9px',color:'var(--t4)'}},d.label));});c.appendChild(xl);
  const lg=h('div',{style:{display:'flex',gap:'12px',justifyContent:'center',marginTop:'8px'}});
  labels.forEach((l,i)=>lg.appendChild(h('span',{style:{fontSize:'9px',color:colors[i],display:'flex',alignItems:'center',gap:'3px'}},h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:colors[i],display:'inline-block'}}),l)));
  c.appendChild(lg);return c;
}
function mkScatter(data,xK,yK,xM,yM,color){
  if(data.length<2)return h('p',{style:{fontSize:'12px',color:'var(--t4)',textAlign:'center'}},'2日以上のデータが必要です');
  const w=100,ht=60,pad=8;let svg=`<svg viewBox="0 0 ${w} ${ht}" style="width:100%;height:140px;">`;
  svg+=`<line x1="${pad}" y1="${ht-pad}" x2="${w-pad}" y2="${ht-pad}" stroke="rgba(255,255,255,0.06)" stroke-width="0.3"/>`;
  svg+=`<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${ht-pad}" stroke="rgba(255,255,255,0.06)" stroke-width="0.3"/>`;
  data.filter(d=>d[xK]>0).forEach(d=>{const x=pad+(d[xK]/xM)*(w-pad*2);const y=ht-pad-(d[yK]/yM)*(ht-pad*2);svg+=`<circle cx="${x}" cy="${y}" r="2" fill="${color}" opacity="0.6"/>`;});
  svg+='</svg>';return h('div',{innerHTML:svg});
}
function mkBars(items,vKeys,colors,labels){
  const c=h('div',{});const bw=Math.max(20,Math.min(50,280/(items.length*vKeys.length)));
  const bars=h('div',{style:{display:'flex',alignItems:'flex-end',gap:'8px',height:'140px',justifyContent:'center'}});
  items.forEach(item=>{const col=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}});
    const bg=h('div',{style:{display:'flex',gap:'2px',alignItems:'flex-end'}});
    vKeys.forEach((k,ki)=>bg.appendChild(h('div',{style:{width:bw+'px',borderRadius:'4px 4px 0 0',background:colors[ki],height:Math.max(4,item[k]/10*100)+'px'}})));
    col.append(bg,h('span',{style:{fontSize:'9px',color:'var(--t3)',textAlign:'center',maxWidth:(bw*2+8)+'px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},item.name),h('span',{style:{fontSize:'8px',color:'var(--t4)'}},'n='+item.n));
    bars.appendChild(col);});
  c.appendChild(bars);
  const lg=h('div',{style:{display:'flex',gap:'12px',justifyContent:'center',marginTop:'8px'}});
  labels.forEach((l,i)=>lg.appendChild(h('span',{style:{fontSize:'9px',color:colors[i],display:'flex',alignItems:'center',gap:'3px'}},h('span',{style:{width:'6px',height:'6px',borderRadius:'2px',background:colors[i],display:'inline-block'}}),l)));
  c.appendChild(lg);return c;
}

/* ═══ SAVE & AI ═══ */
async function doSave(){
  try{await dbS('log:'+S.date,JSON.parse(JSON.stringify(S.log)));
    const ne=S.log.medications.map(m=>({date:S.date,name:m.name,dose:m.dose,timing:m.timing,taken:m.taken}));
    S.mh=S.mh.filter(h=>h.date!==S.date).concat(ne);await dbS(MHKEY,S.mh);
    await rLD();toast('保存しました');render();
    if(S.sets.apiKey)doAI();
  }catch(e){toast('保存に失敗しました');console.error(e);}
}
async function doAI(){
  S.ail=true;S.ai=null;render();
  try{const recent=[];for(let i=1;i<=7;i++){const d=new Date(S.date);d.setDate(d.getDate()-i);const l=await dbG('log:'+fd(d));if(l)recent.push({date:fd(d),...l});}
    const rs=recent.map(r=>`${r.date}:P${r.evaluation?.productivity||'?'} M${r.evaluation?.mental||'?'} 睡眠質${r.sleep?.quality||'?'} 気分${r.journal?.moodScore||'?'}`).join('\n');
    const L=S.log,sl=L.sleep||{};
    const prompt=`あなたはウェルネスAIコーチ。JSON形式のみで回答。
{"feedback":"フィードバック2-3文","tomorrow_prediction":{"productivity":1-10,"mental":1-10,"condition":"体調予測"},"recommendation":"アドバイス1-2文","journal_tags":["タグ3-5個"],"journal_summary":"日記1行要約"}
今日${S.date}: 薬:${(L.medications||[]).filter(m=>m.taken).map(m=>m.name).join(',')||'なし'} 運動:${L.restDay?'休み':L.exercises?.length+'種目'} 睡眠:${sl.bedtime}→${sl.wakeup} 質${sl.quality}/5${sl.hr?' HR'+sl.hr:''}${sl.restHr?' 安静HR'+sl.restHr:''} 日記:${L.journal?.text||'なし'} 気分${L.journal?.moodScore}/10 P${L.evaluation?.productivity}/10 M${L.evaluation?.mental}/10
直近7日:\n${rs||'なし'}`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.sets.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();const text=data.content?.map(c=>c.text||'').join('')||'';
    S.ai=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(S.ai.journal_tags){S.log.journal.autoTags=S.ai.journal_tags;S.log.journal.summary=S.ai.journal_summary;await dbS('log:'+S.date,JSON.parse(JSON.stringify(S.log)));}
  }catch(e){console.error('AI:',e);S.ai={feedback:'API接続に失敗しました。設定でAPIキーを確認してください。'};}
  S.ail=false;render();
}
async function saveS(){await dbS(SKEY,S.sets);}

async function pasteSleep(){
  try{const text=await navigator.clipboard.readText();let data={};
    if(text.includes(':')){if(text.includes('bedtime:')||text.includes('deep:')||text.includes('hr:')){text.split(',').forEach(p=>{const i=p.indexOf(':');if(i===-1)return;data[p.substring(0,i).trim()]=p.substring(i+1).trim();});}else{const ps=text.trim().split(',').map(s=>s.trim());if(ps.length>=2){data.bedtime=ps[0];data.wakeup=ps[1];}}}
    if(!data.bedtime&&!data.deep&&!data.hr){toast('形式が不正です');return;}
    const sl=S.log.sleep;
    if(data.bedtime)sl.bedtime=data.bedtime;if(data.wakeup)sl.wakeup=data.wakeup;
    sl.deep=+data.deep||null;sl.rem=+data.rem||null;sl.core=+data.core||null;sl.awake=+data.awake||null;sl.hr=+data.hr||null;sl.restHr=+data.resthr||null;sl.resp=+data.resp||null;
    if(sl.deep||sl.rem){let sc=3;const tot=(sl.deep||0)+(sl.rem||0)+(sl.core||0)+(sl.awake||0);if(tot>0){const dp=(sl.deep||0)/tot,rp=(sl.rem||0)/tot;if(dp>=.15&&rp>=.2)sc=5;else if(dp>=.12&&rp>=.15)sc=4;else if(dp>=.08||rp>=.12)sc=3;else sc=2;if(((sl.awake||0)/tot)>.15)sc=Math.max(1,sc-1);}if(sl.hr&&sl.hr<50)sc=Math.min(5,sc+1);if(sl.hr&&sl.hr>70)sc=Math.max(1,sc-1);sl.quality=sc;}
    toast('睡眠データを取り込みました');render();
  }catch{toast('クリップボードを読み取れませんでした');}
}

init();
